<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Journeys | Trufleet Pilot</title>
    
    <!-- FONTS & ICONS -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* 
         * DESIGN SYSTEM: "AERO-LIGHT" (Unified System)
         */
        :root {
            --primary: #0F172A;
            --accent: #2563EB;
            --accent-soft: #EFF6FF;
            --bg-body: #F1F5F9;
            --bg-card: #FFFFFF;
            --text-main: #1E293B;
            --text-muted: #64748B;
            --success: #10B981;
            --warning: #F59E0B;
            --danger: #EF4444;
            --border: #E2E8F0;
            
            --sidebar-width: 280px;
            --sidebar-collapsed: 80px;
            --header-height: 80px;
            
            --shadow-card: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            --shadow-hover: 0 10px 15px -3px rgba(0, 0, 0, 0.08);
            
            --radius-lg: 16px;
            --radius-md: 10px;
            
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            overflow-x: hidden;
        }

        .app-container {
            display: grid;
            grid-template-columns: var(--sidebar-width) 1fr;
            transition: grid-template-columns 0.4s ease;
            min-height: 100vh;
        }

        .app-container.collapsed {
            grid-template-columns: var(--sidebar-collapsed) 1fr;
        }

        /* SIDEBAR */
        aside {
            background: var(--bg-card);
            border-right: 1px solid var(--border);
            padding: 1.5rem 1rem;
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 0;
            height: 100vh;
            z-index: 50;
            transition: var(--transition-smooth);
        }

        .brand-logo {
            display: flex; align-items: center; gap: 12px;
            padding: 0 1rem 2.5rem; color: var(--primary); text-decoration: none;
            overflow: hidden; white-space: nowrap;
        }
        
        .brand-text {
            font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 1.4rem;
            opacity: 1; transition: opacity 0.2s;
        }

        .app-container.collapsed .brand-text { opacity: 0; display: none; }

        .nav-menu { flex: 1; }

        .nav-item {
            display: flex; align-items: center; gap: 16px; padding: 12px 16px;
            color: var(--text-muted); text-decoration: none; border-radius: 12px;
            transition: var(--transition-smooth); font-weight: 500; margin-bottom: 4px;
            white-space: nowrap; overflow: hidden;
        }

        .nav-item:hover, .nav-item.active {
            background-color: var(--accent-soft);
            color: var(--accent);
        }
        .nav-item i { min-width: 24px; text-align: center; font-size: 1.1rem; }

        /* MAIN CONTENT */
        main { overflow-y: auto; height: 100vh; }

        header {
            height: var(--header-height);
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(226, 232, 240, 0.6);
            position: sticky;
            top: 0;
            z-index: 40;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
        }
        
        .header-left { display: flex; align-items: center; gap: 1rem; }
        .toggle-btn { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: var(--text-muted); }

        .profile-chip {
            display: flex; align-items: center; gap: 10px;
            padding: 6px 12px; background: white; border: 1px solid var(--border);
            border-radius: 30px; cursor: pointer;
        }
        .profile-img { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; }

        .dashboard-content {
            padding: 2rem;
            max-width: 1000px;
            margin: 0 auto;
            opacity: 0;
            animation: fadeInPage 0.6s ease-out forwards;
        }

        /* STATS SUMMARY */
        .stats-row {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; margin-bottom: 2rem;
        }
        .mini-stat {
            background: var(--bg-card); padding: 1.25rem; border-radius: var(--radius-lg);
            box-shadow: var(--shadow-card); border: 1px solid var(--border);
        }
        .ms-label { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 4px; }
        .ms-value { font-family: 'Outfit'; font-size: 1.5rem; font-weight: 700; color: var(--primary); }

        /* TABS */
        .tabs { display: flex; gap: 1rem; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem; }
        .tab-btn {
            background: none; border: none; font-size: 1rem; font-weight: 600; color: var(--text-muted);
            cursor: pointer; padding: 8px 16px; border-radius: 8px; transition: 0.3s;
        }
        .tab-btn.active { background: var(--accent-soft); color: var(--accent); }

        /* TRIP CARD */
        .trip-card {
            background: var(--bg-card); border-radius: var(--radius-lg);
            padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: var(--shadow-card);
            border: 1px solid var(--border); transition: 0.3s; cursor: pointer;
            display: grid; grid-template-columns: 80px 1fr 120px; gap: 1.5rem; align-items: center;
        }
        .trip-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-hover); border-color: var(--accent); }

        .trip-date-box {
            background: var(--bg-body); border-radius: 12px; text-align: center; padding: 10px 0;
            display: flex; flex-direction: column; justify-content: center; height: 80px;
        }
        .td-month { font-size: 0.75rem; text-transform: uppercase; font-weight: 700; color: var(--text-muted); }
        .td-day { font-family: 'Outfit'; font-size: 1.8rem; font-weight: 700; color: var(--primary); }

        .trip-route { position: relative; }
        .route-visual { display: flex; flex-direction: column; gap: 4px; border-left: 2px dashed #CBD5E1; padding-left: 1.5rem; margin-left: 8px; position: relative; }
        .route-visual::before { content: ''; position: absolute; left: -6px; top: 0; width: 10px; height: 10px; border-radius: 50%; background: var(--success); }
        .route-visual::after { content: ''; position: absolute; left: -6px; bottom: 0; width: 10px; height: 10px; border-radius: 50%; background: var(--accent); }
        
        .loc-name { font-weight: 600; font-size: 1.1rem; color: var(--primary); }
        .loc-time { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 10px; }

        .trip-status { text-align: right; }
        .status-pill {
            display: inline-block; padding: 6px 12px; border-radius: 20px; font-size: 0.75rem;
            font-weight: 700; text-transform: uppercase; margin-bottom: 8px;
        }
        .st-scheduled { background: #EFF6FF; color: var(--accent); }
        .st-completed { background: #ECFDF5; color: var(--success); }
        .trip-id { font-size: 0.8rem; color: var(--text-muted); display: block; }

        /* DRAWER */
        .drawer-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(4px);
            z-index: 100; opacity: 0; visibility: hidden; transition: 0.4s ease;
        }
        .drawer {
            position: absolute; top: 0; right: 0; width: 500px; height: 100%;
            background: white; box-shadow: -10px 0 40px rgba(0,0,0,0.1);
            transform: translateX(100%); transition: 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            display: flex; flex-direction: column;
        }
        .drawer-overlay.open { opacity: 1; visibility: visible; }
        .drawer-overlay.open .drawer { transform: translateX(0); }
        .drawer-header { padding: 1.5rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .drawer-body { padding: 2rem; overflow-y: auto; flex: 1; }

        .detail-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--bg-body); }
        .d-label { color: var(--text-muted); font-size: 0.9rem; }
        .d-val { font-weight: 600; color: var(--primary); }

        @keyframes fadeInPage { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 768px) {
            .app-container { grid-template-columns: 1fr; }
            .app-container aside { position: fixed; left: -280px; transition: 0.3s; }
            .app-container.mobile-open aside { left: 0; }
            .stats-row { grid-template-columns: 1fr; }
            .trip-card { grid-template-columns: 1fr; gap: 1rem; text-align: center; }
            .trip-date-box { flex-direction: row; gap: 10px; align-items: center; height: auto; }
            .route-visual { align-items: center; border-left: none; padding-left: 0; }
            .route-visual::before, .route-visual::after { display: none; }
            .trip-status { text-align: center; }
            .drawer { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="app-container" id="appContainer">
        
        <!-- SIDEBAR -->
        <aside id="sidebar">
            <a href="#" class="brand-logo">
                <i class="fa-solid fa-cube" style="font-size: 1.8rem; color: var(--accent);"></i>
                <span class="brand-text">Trufleet</span>
            </a>

            <nav class="nav-menu">
                <a href="dashboard_driver.html" class="nav-item">
                    <i class="fa-solid fa-gauge-high"></i>
                    <span class="brand-text">Dashboard</span>
                </a>
                <a href="MyTrips_driver.html" class="nav-item active">
                    <i class="fa-solid fa-route"></i>
                    <span class="brand-text">My Trips</span>
                </a>
                <a href="Vehicle_status_driver.html" class="nav-item">
                    <i class="fa-solid fa-truck"></i>
                    <span class="brand-text">Vehicle Status</span>
                </a>
                <a href="Documents_driver.html" class="nav-item">
                    <i class="fa-solid fa-file-lines"></i>
                    <span class="brand-text">Documents</span>
                </a>
                <div style="flex-grow: 1;"></div>
                <a href="support_driver.html" class="nav-item">
                    <i class="fa-solid fa-headset"></i>
                    <span class="brand-text">Support</span>
                </a>
                <a href="#" onclick="logout()" class="nav-item" style="color: var(--danger);">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i>
                    <span class="brand-text">Logout</span>
                </a>
            </nav>
        </aside>

        <!-- MAIN CONTENT -->
        <main>
            <header>
                <div class="header-left">
                    <button class="toggle-btn" onclick="toggleSidebar()">
                        <i class="fa-solid fa-bars-staggered"></i>
                    </button>
                    <span style="font-family: 'Outfit'; font-weight: 600; font-size: 1.25rem;">My Journeys</span>
                </div>
                <div class="profile-chip">
                    <img id="profileImg" src="" class="profile-img" onerror="this.src='https://ui-avatars.com/api/?name=Driver&background=2563EB&color=fff'">
                    <div>
                        <span class="profile-name" id="profileName">Loading...</span>
                        <span class="profile-role" style="display:block;font-size:0.7rem;color:var(--text-muted)">Fleet Pilot</span>
                    </div>
                </div>
            </header>

            <div class="dashboard-content">
                
                <!-- DRIVER STATS -->
                <div class="stats-row">
                    <div class="mini-stat">
                        <p class="ms-label">Total Distance (this month)</p>
                        <p class="ms-value"><span id="statDistance">—</span> <span style="font-size: 1rem; color: var(--text-muted); font-weight: 500;">km</span></p>
                    </div>
                    <div class="mini-stat">
                        <p class="ms-label">Trips Completed</p>
                        <p class="ms-value" id="statTrips">—</p>
                    </div>
                    <div class="mini-stat">
                        <p class="ms-label">On-Time Rate</p>
                        <p class="ms-value" id="statOnTime" style="color: var(--success);">—</p>
                    </div>
                </div>

                <!-- TABS -->
                <div class="tabs">
                    <button class="tab-btn active" id="tabUpcoming" onclick="switchView('scheduled')">Upcoming</button>
                    <button class="tab-btn" id="tabHistory" onclick="switchView('history')">History</button>
                </div>

                <!-- LIST VIEW: UPCOMING -->
                <div id="scheduledList">
                    <h4 style="margin-bottom: 1rem; color: var(--text-muted); font-weight: 500;">Next Up</h4>
                    <div id="scheduledCards"><p style="color:var(--text-muted);">Loading trips...</p></div>
                </div>

                <!-- LIST VIEW: HISTORY (Hidden by default) -->
                <div id="historyList" style="display: none;">
                    <h4 style="margin-bottom: 1rem; color: var(--text-muted); font-weight: 500;">Past Trips</h4>
                    <div id="historyCards"><p style="color:var(--text-muted);">Loading history...</p></div>
                </div>

            </div>
        </main>
    </div>

    <!-- TRIP DETAILS DRAWER -->
    <div class="drawer-overlay" id="drawerOverlay" onclick="if(event.target === this) closeDrawer()">
        <div class="drawer">
            <div class="drawer-header">
                <div>
                    <h2 id="drawerId" style="font-family: 'Outfit'; color: var(--primary);">Trip Details</h2>
                    <span style="font-size: 0.9rem; color: var(--text-muted);">Dispatch Info</span>
                </div>
                <button onclick="closeDrawer()" style="background: none; border: none; font-size: 1.2rem; cursor: pointer;"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="drawer-body">
                <div style="background: var(--bg-body); height: 150px; border-radius: 12px; margin-bottom: 1.5rem; display: flex; align-items: center; justify-content: center; color: var(--text-muted);">
                    <i class="fa-solid fa-map-location-dot" style="font-size: 2rem;"></i>
                    <span style="margin-left: 10px;">Map Visualization</span>
                </div>
                <div id="drawerDetails"></div>
            </div>
        </div>
    </div>

    <script>
        // ─── Auth Guard ────────────────────────────────────────────────────────
        const TOKEN = localStorage.getItem('trufleet_token');
        if (!TOKEN) location.href = '../login.html';
        function parseJwt(t) { try { return JSON.parse(atob(t.split('.')[1])); } catch { return null; } }
        const ME = parseJwt(TOKEN);
        if (!ME || ME.role !== 'driver') { localStorage.clear(); location.href = '../login.html'; }

        async function apiFetch(path, opts = {}) {
            const res = await fetch(path, {
                ...opts,
                headers: { 'Authorization': `Bearer ${TOKEN}`, 'Content-Type': 'application/json', ...(opts.headers || {}) }
            });
            if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.error || 'API error'); }
            return res.json();
        }

        function logout() { localStorage.clear(); location.href = '../login.html'; }

        // ─── Sidebar Logic ────────────────────────────────────────────────────
        const appContainer = document.getElementById('appContainer');
        const sidebar      = document.getElementById('sidebar');
        function toggleSidebar() {
            if (window.innerWidth <= 768) appContainer.classList.toggle('mobile-open');
            else appContainer.classList.toggle('collapsed');
        }
        sidebar.addEventListener('mouseenter', () => {
            if (window.innerWidth > 768 && appContainer.classList.contains('collapsed')) {
                appContainer.classList.remove('collapsed');
                sidebar.dataset.autoExpanded = 'true';
            }
        });
        sidebar.addEventListener('mouseleave', () => {
            if (window.innerWidth > 768 && sidebar.dataset.autoExpanded === 'true') {
                appContainer.classList.add('collapsed');
                sidebar.dataset.autoExpanded = 'false';
            }
        });

        // ─── State ────────────────────────────────────────────────────────────
        let allUpcoming = [], allHistory = [];

        // ─── Load Profile ────────────────────────────────────────────────────
        async function loadMe() {
            try {
                const data = await apiFetch('/api/driver/me');
                document.getElementById('profileName').textContent = data.full_name || 'Driver';
                const img = document.getElementById('profileImg');
                img.src = data.avatar_url || `https://ui-avatars.com/api/?name=${encodeURIComponent(data.full_name || 'D')}&background=2563EB&color=fff`;
            } catch (e) { console.error('loadMe:', e); }
        }

        // ─── Load Stats ───────────────────────────────────────────────────────
        async function loadStats() {
            try {
                const s = await apiFetch('/api/driver/trips/stats');
                document.getElementById('statDistance').textContent = Number(s.totalDistance || 0).toLocaleString();
                document.getElementById('statTrips').textContent    = s.totalTrips ?? 0;
                document.getElementById('statOnTime').textContent   = `${s.onTimeRate ?? 0}%`;
            } catch (e) { console.error('loadStats:', e); }
        }

        // ─── Helpers ──────────────────────────────────────────────────────────
        function formatDate(iso) {
            if (!iso) return { month: '?', day: '?' };
            const d = new Date(iso);
            return {
                month: d.toLocaleString('en-US', { month: 'short' }),
                day:   d.getDate()
            };
        }

        function statusPillHtml(status) {
            const map = {
                pending:   { cls: 'st-scheduled', label: 'Pending' },
                active:    { cls: 'st-scheduled', label: 'Active' },
                completed: { cls: 'st-completed', label: 'Completed' },
                rejected:  { cls: '', label: 'Rejected' }
            };
            const s = map[status] || { cls: '', label: status };
            return `<span class="status-pill ${s.cls}">${s.label}</span>`;
        }

        function buildTripCard(trip) {
            const dt = formatDate(trip.created_at);
            return `
            <div class="trip-card" onclick='openDrawer(${JSON.stringify(trip)})'>
                <div class="trip-date-box">
                    <span class="td-month">${dt.month}</span>
                    <span class="td-day">${dt.day}</span>
                </div>
                <div class="trip-route">
                    <div class="route-visual">
                        <div>
                            <div class="loc-name">${trip.origin || '—'}</div>
                            <div class="loc-time">Origin</div>
                        </div>
                        <div style="margin-top: 15px;">
                            <div class="loc-name">${trip.destination || '—'}</div>
                            <div class="loc-time">${trip.eta ? 'ETA: ' + trip.eta : 'Destination'}</div>
                        </div>
                    </div>
                </div>
                <div class="trip-status">
                    ${statusPillHtml(trip.status)}
                    <span class="trip-id">ID: ${trip.ticket_number || '—'}</span>
                </div>
            </div>`;
        }

        // ─── Load Trips ───────────────────────────────────────────────────────
        async function loadTrips() {
            try {
                const [upcoming, history] = await Promise.all([
                    apiFetch('/api/driver/trips?view=upcoming'),
                    apiFetch('/api/driver/trips?view=history')
                ]);
                allUpcoming = upcoming || [];
                allHistory  = history  || [];

                const schedCont = document.getElementById('scheduledCards');
                const histCont  = document.getElementById('historyCards');

                schedCont.innerHTML = allUpcoming.length
                    ? allUpcoming.map(buildTripCard).join('')
                    : '<p style="color:var(--text-muted)">No upcoming trips scheduled.</p>';

                histCont.innerHTML = allHistory.length
                    ? allHistory.map(buildTripCard).join('')
                    : '<p style="color:var(--text-muted)">No trip history yet.</p>';

                document.getElementById('tabUpcoming').textContent = `Upcoming (${allUpcoming.length})`;
                document.getElementById('tabHistory').textContent  = `History (${allHistory.length})`;
            } catch (e) { console.error('loadTrips:', e); }
        }

        // ─── Tab Logic ─────────────────────────────────────────────────────────
        function switchView(viewName) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            if (viewName === 'scheduled') {
                document.getElementById('scheduledList').style.display = 'block';
                document.getElementById('historyList').style.display   = 'none';
            } else {
                document.getElementById('scheduledList').style.display = 'none';
                document.getElementById('historyList').style.display   = 'block';
            }
        }

        // ─── Drawer Logic ─────────────────────────────────────────────────────
        function openDrawer(trip) {
            if (typeof trip === 'string') return; // guard
            document.getElementById('drawerId').textContent = trip.ticket_number || 'Trip Details';
            const v = trip.vehicle;
            const rows = [
                ['Route', `${trip.origin || '—'} → ${trip.destination || '—'}`],
                ['Status', trip.status ? trip.status.charAt(0).toUpperCase() + trip.status.slice(1) : '—'],
                ['Vehicle', v ? `${v.make} ${v.model} (${v.registration_number})` : '—'],
                ['Cargo Type', trip.cargo_type || '—'],
                ['Cargo Weight', trip.cargo_weight || '—'],
                ['Priority', trip.priority || '—'],
                ['ETA', trip.eta || '—'],
                ['Progress', trip.progress_pct != null ? `${trip.progress_pct}%` : '—'],
                ['Created', trip.created_at ? new Date(trip.created_at).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' }) : '—']
            ];
            document.getElementById('drawerDetails').innerHTML =
                rows.map(([label, val]) =>
                    `<div class="detail-row"><span class="d-label">${label}</span><span class="d-val">${val}</span></div>`
                ).join('') +
                `<h4 style="margin-top: 2rem; margin-bottom: 1rem; color: var(--primary);">Proof of Delivery</h4>
                <div style="border: 1px dashed var(--border); padding: 1.5rem; text-align: center; border-radius: 12px;">
                    <p style="color: var(--text-muted); font-size: 0.9rem;">Digital Signature / E-POD will appear here after completion.</p>
                </div>`;
            document.getElementById('drawerOverlay').classList.add('open');
        }

        function closeDrawer() { document.getElementById('drawerOverlay').classList.remove('open'); }

        // ─── Init ─────────────────────────────────────────────────────────────
        loadMe();
        loadStats();
        loadTrips();
    </script>
</body>
</html>
