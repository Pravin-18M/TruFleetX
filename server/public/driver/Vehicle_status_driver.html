<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>My Vehicle — TruFleetX</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
<style>
:root{
  --bg:#F0F4F8;--sidebar:#1A2332;--sidebar-w:240px;
  --card:#fff;--border:#E2E8F0;
  --primary:#2D3A8C;--primary-light:#E8EAFB;
  --accent:#4F8EF7;--accent-light:#EBF3FF;
  --green:#0EA371;--green-light:#D1FAE5;
  --red:#E53E3E;--red-light:#FED7D7;
  --orange:#DD6B20;--orange-light:#FEEBC8;
  --yellow:#D69E2E;--yellow-light:#FEFCBF;
  --purple:#6B46C1;--purple-light:#E9D8FD;
  --text:#1A202C;--muted:#64748B;--bdr:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh}
.sidebar{width:var(--sidebar-w);background:var(--sidebar);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;overflow-y:auto;z-index:100}
.sidebar-logo{padding:22px 18px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.07)}
.logo-mark{width:34px;height:34px;background:linear-gradient(135deg,#4F8EF7,#2D3A8C);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;color:#fff;font-weight:800;flex-shrink:0}
.logo-text{font-family:'Outfit',sans-serif;font-size:16px;font-weight:700;color:#fff}
.sidebar-section{padding:14px 14px 4px;font-size:10px;font-weight:600;color:rgba(255,255,255,.32);letter-spacing:.12em;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 14px;border-radius:8px;text-decoration:none;color:rgba(255,255,255,.58);font-size:13px;font-weight:500;margin:1px 0;transition:all .15s}
.nav-item:hover{background:rgba(255,255,255,.08);color:#fff}
.nav-item.active{background:linear-gradient(90deg,rgba(79,142,247,.25),rgba(79,142,247,.08));color:#fff;border-left:3px solid #4F8EF7}
.nav-item i{width:18px;font-size:13px;text-align:center;flex-shrink:0}
.sidebar-bottom{margin-top:auto;padding:12px;border-top:1px solid rgba(255,255,255,.07)}
.main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-height:100vh}
.header{background:var(--card);border-bottom:1px solid var(--border);padding:0 26px;height:62px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.hdr-title{font-family:'Outfit',sans-serif;font-size:17px;font-weight:700;color:var(--primary)}
.hdr-sub{font-size:11px;color:var(--muted);margin-top:1px}
.driver-chip{display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:5px 12px 5px 5px}
.driver-avatar{width:28px;height:28px;border-radius:50%;object-fit:cover}
.sdot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2.5s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.content{padding:24px;flex:1}
.slabel{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.slabel::after{content:'';flex:1;height:1px;background:var(--border)}
/* VEHICLE IDENTITY */
.vid-card{background:linear-gradient(135deg,var(--primary) 0%,#4F8EF7 100%);border-radius:var(--bdr);padding:26px 28px;display:flex;align-items:center;gap:24px;margin-bottom:22px;color:#fff;position:relative;overflow:hidden}
.vid-card::after{content:'';position:absolute;right:-30px;top:-30px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.05)}
.vid-ico{width:64px;height:64px;background:rgba(255,255,255,.15);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0}
.vid-info h2{font-family:'Outfit',sans-serif;font-size:22px;font-weight:800;margin-bottom:4px}
.vid-info .reg{font-size:16px;font-weight:700;color:rgba(255,255,255,.85);margin-bottom:6px}
.vid-info .meta{font-size:12px;color:rgba(255,255,255,.65);display:flex;flex-wrap:wrap;gap:12px}
.vid-info .meta span{display:flex;align-items:center;gap:4px}
.status-badge{margin-left:auto;display:flex;flex-direction:column;align-items:center;text-align:center;flex-shrink:0}
.sbig{font-size:11px;font-weight:700;padding:7px 14px;border-radius:20px;margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em}
.sa-active{background:rgba(14,163,113,.25);color:#6EE7B7}
.sa-maintenance{background:rgba(221,107,32,.25);color:#FBD38D}
.sa-inactive{background:rgba(229,62,62,.25);color:#FEB2B2}
/* STATUS CARDS */
.status-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:22px}
.status-card{background:var(--card);border:1px solid var(--border);border-radius:var(--bdr);padding:18px}
.sc-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sc-ico{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px}
.sc-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.sc-val{font-family:'Outfit',sans-serif;font-size:22px;font-weight:800;margin:6px 0 2px}
.sc-sub{font-size:12px;color:var(--muted)}
.pbar{height:6px;border-radius:20px;background:var(--border);margin-top:8px;overflow:hidden}
.pbar-fill{height:100%;border-radius:20px;transition:width .6s ease}
/* REPORT ISSUE */
.form-card{background:var(--card);border:1px solid var(--border);border-radius:var(--bdr);padding:20px}
label.fl{display:block;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em}
input.fi,select.fi,textarea.fi{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-family:'Inter',sans-serif;font-size:13px;color:var(--text);outline:none;background:#fff;transition:border-color .15s}
input.fi:focus,select.fi:focus,textarea.fi:focus{border-color:var(--accent)}
.fgroup{margin-bottom:14px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:14px}
/* MAINTENANCE TABLE */
.mhx-card{background:var(--card);border:1px solid var(--border);border-radius:var(--bdr);overflow:hidden}
table.mhx{width:100%;border-collapse:collapse}
table.mhx th{padding:11px 14px;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;text-align:left;border-bottom:1px solid var(--border);background:#FAFBFD}
table.mhx td{padding:12px 14px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:middle}
table.mhx tbody tr:last-child td{border-bottom:none}
table.mhx tbody tr:hover td{background:#FAFBFD}
.mpill{font-size:10px;font-weight:700;padding:4px 10px;border-radius:20px}
.mc-done{background:var(--green-light);color:var(--green)}
.mc-pending{background:var(--yellow-light);color:var(--yellow)}
.mc-progress{background:var(--accent-light);color:var(--accent)}
.mc-sched{background:var(--purple-light);color:var(--purple)}
.mc-crit{background:var(--red-light);color:var(--red)}
.mc-high{background:var(--orange-light);color:var(--orange)}
.mc-med{background:var(--yellow-light);color:var(--yellow)}
.mc-low{background:var(--green-light);color:var(--green)}
/* BTNS */
.btn-primary{padding:10px 20px;border-radius:9px;border:none;background:var(--accent);color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;display:flex;align-items:center;gap:7px;transition:all .2s}
.btn-primary:hover:not(:disabled){background:#3a7de8}
.btn-primary:disabled{opacity:.55;cursor:not-allowed}
.toast{position:fixed;bottom:22px;right:22px;background:#1A2332;color:#fff;padding:11px 16px;border-radius:10px;font-size:13px;font-weight:500;z-index:999;opacity:0;transform:translateY(8px);transition:all .3s;pointer-events:none;display:flex;align-items:center;gap:7px;max-width:340px}
.toast.show{opacity:1;transform:translateY(0)}
.shimmer{background:linear-gradient(90deg,#F1F5F9 25%,#E2E8F0 50%,#F1F5F9 75%);background-size:200% 100%;animation:shim 1.4s infinite;border-radius:8px}
@keyframes shim{0%{background-position:200% 0}100%{background-position:-200% 0}}
</style>
</head>
<body>
<nav class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-mark">T</div>
    <span class="logo-text">TruFleetX</span>
  </div>
  <div class="sidebar-section">Pilot Portal</div>
  <a href="dashboard_driver.html" class="nav-item"><i class="fa-solid fa-gauge-high"></i><span>Dashboard</span></a>
  <a href="MyTrips_driver.html" class="nav-item"><i class="fa-solid fa-route"></i><span>My Trips</span></a>
  <a href="Vehicle_status_driver.html" class="nav-item active"><i class="fa-solid fa-truck"></i><span>My Vehicle</span></a>
  <a href="Documents_driver.html" class="nav-item"><i class="fa-solid fa-folder-open"></i><span>Documents</span></a>
  <a href="support_driver.html" class="nav-item"><i class="fa-solid fa-headset"></i><span>Support</span></a>
  <div class="sidebar-bottom">
    <a href="../login.html" class="nav-item" style="color:rgba(255,255,255,.4)" onclick="localStorage.clear()">
      <i class="fa-solid fa-arrow-right-from-bracket"></i><span>Sign Out</span>
    </a>
  </div>
</nav>
<div class="main">
  <div class="header">
    <div>
      <div class="hdr-title"><i class="fa-solid fa-truck" style="color:var(--accent);margin-right:7px;font-size:14px"></i>My Vehicle</div>
      <div class="hdr-sub" id="hdrSub">Loading vehicle details…</div>
    </div>
    <div class="driver-chip">
      <span class="sdot"></span>
      <img id="avatar" class="driver-avatar" src="" alt=""/>
      <span id="dName" style="font-size:13px;font-weight:600">Driver</span>
    </div>
  </div>
  <div class="content">
    <!-- VEHICLE IDENTITY -->
    <div id="vidCard" class="vid-card">
      <div class="vid-ico"><i class="fa-solid fa-truck"></i></div>
      <div class="vid-info">
        <div class="shimmer" style="width:180px;height:22px;margin-bottom:6px"></div>
        <div class="shimmer" style="width:120px;height:16px;margin-bottom:8px"></div>
        <div style="display:flex;gap:12px">
          <div class="shimmer" style="width:80px;height:11px"></div>
          <div class="shimmer" style="width:80px;height:11px"></div>
        </div>
      </div>
    </div>
    <!-- STATUS CARDS -->
    <div class="slabel">Vehicle Health</div>
    <div class="status-grid" id="statusGrid">
      <div class="status-card shimmer" style="height:110px"></div>
      <div class="status-card shimmer" style="height:110px"></div>
      <div class="status-card shimmer" style="height:110px"></div>
    </div>
    <!-- REPORT ISSUE + HISTORY side-by-side -->
    <div style="display:grid;grid-template-columns:360px 1fr;gap:18px;align-items:flex-start">
      <div>
        <div class="slabel">Report an Issue</div>
        <div class="form-card">
          <div class="fgroup">
            <label class="fl">Issue Category</label>
            <select id="issCategory" class="fi">
              <option value="">Select category…</option>
              <option value="Engine">Engine / Mechanical</option>
              <option value="Tyres">Tyres / Wheels</option>
              <option value="Brakes">Brakes</option>
              <option value="Electrical">Electrical / Battery</option>
              <option value="Fuel">Fuel System</option>
              <option value="Body">Body / Exterior Damage</option>
              <option value="AC/HVAC">AC / HVAC</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="fgroup">
            <label class="fl">Priority</label>
            <select id="issPriority" class="fi">
              <option value="low">Low — Non-urgent, scheduled service</option>
              <option value="medium">Medium — Monitor and fix soon</option>
              <option value="high" selected>High — Immediate attention needed</option>
              <option value="critical">Critical — Vehicle unsafe to operate</option>
            </select>
          </div>
          <div class="fgroup">
            <label class="fl">Description *</label>
            <textarea id="issDesc" class="fi" rows="4" placeholder="Describe the issue in detail — when it started, what sounds/symptoms you noticed, driving conditions…"></textarea>
          </div>
          <button class="btn-primary" id="issueBtn" onclick="submitIssue()">
            <i class="fa-solid fa-triangle-exclamation"></i> Submit Issue Report
          </button>
        </div>
      </div>
      <div>
        <div class="slabel">Maintenance History</div>
        <div class="mhx-card" id="mhxCard">
          <div style="padding:32px;text-align:center;color:var(--muted);font-size:13px">Loading maintenance records…</div>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"><i class="fa-solid fa-circle-check"></i><span id="toastMsg"></span></div>
<script>
const TOKEN=localStorage.getItem('trufleet_token')||'';
if(!TOKEN){window.location.href='../login.html';}
const api=(path,opts={})=>fetch('/api/driver'+path,{
  ...opts,headers:{'Authorization':'Bearer '+TOKEN,'Content-Type':'application/json',...(opts.headers||{})}
}).then(async r=>{
  if(r.status===401){localStorage.clear();window.location.href='../login.html';}
  const d=await r.json(); if(!r.ok) throw new Error(d.error||'Request failed'); return d;
});

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmtDate(iso){if(!iso)return'—';return new Date(iso).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});}
function toast(msg,err=false){
  const el=document.getElementById('toast');
  el.querySelector('i').className=err?'fa-solid fa-circle-exclamation':'fa-solid fa-circle-check';
  el.style.background=err?'#E53E3E':'#1A2332';
  document.getElementById('toastMsg').textContent=msg;
  el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),3800);
}

let _vehicleId=null;

async function loadProfile(){
  const d=await api('/me');
  const name=d.full_name||d.email?.split('@')[0]||'Driver';
  document.getElementById('dName').textContent=name;
  document.getElementById('avatar').src=d.avatar_url||`https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=4F8EF7&color=fff&size=56`;
}

async function loadVehicle(){
  const d=await api('/vehicle');
  const v=d.vehicle||{};
  _vehicleId=v.id||null;
  const ins=d.insurance||{};
  const mnt=d.nextMaintenance||null;

  if(!v.id){
    document.getElementById('vidCard').innerHTML=`<div class="vid-ico"><i class="fa-solid fa-truck"></i></div><div class="vid-info"><h2>No Vehicle Assigned</h2><div class="reg">Contact your fleet manager to get a vehicle assigned.</div></div>`;
    document.getElementById('hdrSub').textContent='No vehicle assigned';
    return;
  }

  // Vehicle identity card
  const statusClass=v.status==='active'?'sa-active':v.status==='maintenance'?'sa-maintenance':'sa-inactive';
  document.getElementById('vidCard').innerHTML=`
    <div class="vid-ico"><i class="fa-solid fa-truck"></i></div>
    <div class="vid-info">
      <h2>${esc(v.make||'')} ${esc(v.model||'')} ${v.year?'<span style="font-size:16px;font-weight:600;opacity:.8">('+v.year+')</span>':''}</h2>
      <div class="reg">${esc(v.registration_number||'—')}</div>
      <div class="meta">
        <span><i class="fa-solid fa-fingerprint"></i>VIN: ${esc(v.vin||'—')}</span>
        <span><i class="fa-solid fa-palette"></i>${esc(v.color||'—')}</span>
        <span><i class="fa-solid fa-gauge"></i>Odometer: ${v.current_odometer?Number(v.current_odometer).toLocaleString()+' km':'—'}</span>
        <span><i class="fa-solid fa-gas-pump"></i>${esc(v.fuel_type||'—')}</span>
      </div>
    </div>
    <div class="status-badge">
      <span class="sbig ${statusClass}">${v.status||'—'}</span>
      <div style="font-size:11px;color:rgba(255,255,255,.55)">Fleet Status</div>
    </div>`;
  document.getElementById('hdrSub').textContent=`${v.make||''} ${v.model||''} · ${v.registration_number||''}`;

  // Insurance days calc
  const today=new Date();
  const insExpiry=ins.expiry_date?new Date(ins.expiry_date):null;
  const insDays=insExpiry?Math.ceil((insExpiry-today)/(1000*60*60*24)):null;
  const insColor=insDays==null?'var(--muted)':insDays<=0?'var(--red)':insDays<=30?'var(--orange)':'var(--green)';
  const insBg=insDays==null?'var(--bg)':insDays<=0?'var(--red-light)':insDays<=30?'var(--orange-light)':'var(--green-light)';
  const insLabel=insDays==null?'No Policy':insDays<=0?`Expired ${Math.abs(insDays)}d ago`:insDays<=30?`Expiring in ${insDays}d`:`${insDays} days left`;

  // Next maintenance
  const mntDate=mnt?.scheduled_date?new Date(mnt.scheduled_date):null;
  const mntDays=mntDate?Math.ceil((mntDate-today)/(1000*60*60*24)):null;
  const mntColor=mntDays==null?'var(--muted)':mntDays<=0?'var(--red)':mntDays<=7?'var(--orange)':'var(--green)';
  const mntBg=mntDays==null?'var(--bg)':mntDays<=0?'var(--red-light)':mntDays<=7?'var(--orange-light)':'var(--green-light)';
  const mntLabel=mntDays==null?'No Scheduled Maintenance':mntDays<=0?'Overdue!':mntDays===0?'Today!':mntDays<=7?`In ${mntDays} days`:`${fmtDate(mnt.scheduled_date)}`;

  // Fuel level
  const fuelLevel=v.fuel_level!=null?v.fuel_level:null;
  const fuelColor=fuelLevel==null?'var(--muted)':fuelLevel<=15?'var(--red)':fuelLevel<=30?'var(--orange)':'var(--green)';

  document.getElementById('statusGrid').innerHTML=`
    <div class="status-card">
      <div class="sc-head">
        <div class="sc-ico" style="background:${fuelLevel!=null&&fuelLevel>30?'var(--green-light)':fuelLevel!=null&&fuelLevel>15?'var(--orange-light)':'var(--red-light)'};color:${fuelColor}"><i class="fa-solid fa-gas-pump"></i></div>
        <span class="sc-label">Fuel Level</span>
      </div>
      <div class="sc-val" style="color:${fuelColor}">${fuelLevel!=null?fuelLevel+'%':'—'}</div>
      <div class="sc-sub">${fuelLevel==null?'Data unavailable':fuelLevel<=15?'Critically low — refuel immediately':fuelLevel<=30?'Low — plan a refuel':'Sufficient fuel'}</div>
      ${fuelLevel!=null?`<div class="pbar"><div class="pbar-fill" style="width:${fuelLevel}%;background:${fuelColor}"></div></div>`:''}
    </div>
    <div class="status-card">
      <div class="sc-head">
        <div class="sc-ico" style="background:${insBg};color:${insColor}"><i class="fa-solid fa-file-shield"></i></div>
        <span class="sc-label">Insurance</span>
      </div>
      <div class="sc-val" style="color:${insColor}">${insLabel}</div>
      <div class="sc-sub">${ins.provider?esc(ins.provider)+' · '+esc(ins.policy_number||'—'):'No policy on record'}</div>
      <div style="font-size:11px;color:var(--muted);margin-top:4px">${insExpiry?'Expires '+fmtDate(ins.expiry_date):''}</div>
    </div>
    <div class="status-card">
      <div class="sc-head">
        <div class="sc-ico" style="background:${mntBg};color:${mntColor}"><i class="fa-solid fa-wrench"></i></div>
        <span class="sc-label">Next Service</span>
      </div>
      <div class="sc-val" style="color:${mntColor}">${mntLabel}</div>
      <div class="sc-sub">${mnt?esc(mnt.title||'Scheduled Maintenance'):'No upcoming service'}</div>
      <div style="font-size:11px;color:var(--muted);margin-top:4px">${mnt?.location?'At: '+esc(mnt.location):''}</div>
    </div>`;
}

async function loadMaintenanceHistory(){
  try{
    const records=await api('/vehicle/maintenance-history');
    const card=document.getElementById('mhxCard');
    if(!records.length){
      card.innerHTML=`<div style="padding:32px;text-align:center"><div style="font-size:28px;color:var(--border);margin-bottom:10px"><i class="fa-solid fa-wrench"></i></div><div style="font-size:14px;font-weight:700;margin-bottom:5px">No Maintenance Records</div><div style="font-size:12px;color:var(--muted)">Maintenance history will appear here once orders are logged.</div></div>`;
      return;
    }
    const statusClass={completed:'mc-done',pending:'mc-pending','in-progress':'mc-progress',scheduled:'mc-sched'};
    const priorityClass={critical:'mc-crit',high:'mc-high',medium:'mc-med',low:'mc-low'};
    card.innerHTML=`<table class="mhx">
      <thead><tr>
        <th>Title</th><th>Type</th><th>Priority</th><th>Status</th><th>Mechanic</th><th>Scheduled</th><th>Cost</th>
      </tr></thead>
      <tbody>
        ${records.map(r=>`<tr>
          <td><div style="font-weight:600;font-size:13px">${esc(r.title||'—')}</div><div style="font-size:11px;color:var(--muted);margin-top:2px">${esc(r.description?.substring(0,50)||'')}</div></td>
          <td>${esc(r.order_type||'—')}</td>
          <td><span class="mpill ${priorityClass[r.priority]||''}">${r.priority||'—'}</span></td>
          <td><span class="mpill ${statusClass[r.status]||''}">${r.status||'—'}</span></td>
          <td>${esc(r.mechanic_name||'—')}</td>
          <td style="white-space:nowrap">${fmtDate(r.scheduled_date)}</td>
          <td style="white-space:nowrap">${r.actual_cost!=null?'₹'+Number(r.actual_cost).toLocaleString():r.estimated_cost!=null?'Est. ₹'+Number(r.estimated_cost).toLocaleString():'—'}</td>
        </tr>`).join('')}
      </tbody>
    </table>`;
  }catch(e){
    document.getElementById('mhxCard').innerHTML=`<div style="padding:24px;text-align:center;color:var(--red);font-size:13px"><i class="fa-solid fa-circle-xmark"></i> Could not load maintenance history.</div>`;
  }
}

async function submitIssue(){
  const cat=document.getElementById('issCategory').value;
  const pri=document.getElementById('issPriority').value;
  const desc=document.getElementById('issDesc').value.trim();
  if(!cat){toast('Please select a category.',true);return;}
  if(!desc){toast('Please describe the issue.',true);return;}
  const btn=document.getElementById('issueBtn');
  btn.disabled=true; btn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> Submitting…';
  try{
    await api('/vehicle/issue',{method:'POST',body:JSON.stringify({category:cat,priority:pri,description:desc})});
    toast('Issue reported. Maintenance team has been notified.');
    document.getElementById('issCategory').value='';
    document.getElementById('issPriority').value='high';
    document.getElementById('issDesc').value='';
    loadMaintenanceHistory();
  }catch(e){
    toast(e.message,true);
  }finally{
    btn.disabled=false; btn.innerHTML='<i class="fa-solid fa-triangle-exclamation"></i> Submit Issue Report';
  }
}

async function init(){
  await Promise.all([loadProfile(),loadVehicle(),loadMaintenanceHistory()]);
}
init().catch(console.error);
</script>
</body>
</html>
